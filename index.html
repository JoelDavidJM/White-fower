<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ramo de Paniculata y Lirios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@100;300&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --fl-speed: 0.8s;
      --speed-leaf: 2s;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      background: black;
      font-family: 'Georgia', serif;
      overflow: hidden;
      perspective: 1000px;
    }

    /* ── Escena flores oculta al inicio ── */
    #escena-flores {
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
    }

    #escena-flores.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #escena-flores.paused * {
      animation-play-state: paused !important;
    }

    /* ===== ESCENA ===== */
    .scene {
      position: fixed;
      right: 29vw;
      bottom: 0;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      z-index: 5;
    }

    /* ===== LIRIOS ===== */
    .flowers {
      position: relative;
      transform: scale(1.2);
    }

    .flower {
      position: relative;
      bottom: 1vmin;
      transform-origin: bottom center;
    }

    .flower__leafs {
      position: absolute;
      animation: blooming-flower 0.8s backwards, sway-flower 1s ease-in-out 1s infinite;
      animation-delay: 0.3s, 1.5s;
      z-index: 10;
      width: 18vmin;
      height: 18vmin;
    }

    .flower__leafs::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 10vmin;
      height: 10vmin;
      background-color: #feffff;
      filter: blur(12vmin);
    }

    .flower__leafs--1 {
      bottom: 38vmin;
      left: -31vmin;
    }

    .flower__leafs--2 {
      bottom: 55vmin;
      left: -20vmin;
    }

    .flower__leafs--3 {
      bottom: 57vmin;
      left: 3vmin;
    }

    .flower__leafs--4 {
      bottom: 40vmin;
      left: 14vmin;
    }

    .contenedor-flor {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: resplandor 3s ease-in-out infinite;
    }

    @keyframes resplandor {

      0%,
      100% {
        filter: drop-shadow(0 0 1vmin rgba(124, 125, 126, 0.13));
      }

      50% {
        filter: drop-shadow(0 0 2.5vmin rgba(138, 137, 137, 0.425));
      }
    }

    .flor {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 110%;
      left: 51%;
      transform: translate(-50%, -50%);
    }

    .petalo {
      position: absolute;
      width: 5vmin;
      height: 15vmin;
      top: 50%;
      left: 50%;
      transform-origin: center 70%;
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.534));
    }

    .petalo::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #e6f3ff, #ffffff 80%);
      box-shadow: 0 0 65px rgba(255, 255, 255, 0.6);
      border-radius: 50% 50% 30% 30% / 60% 60% 30% 30%;
      clip-path: polygon(50% 0%, 100% 30%, 100% 100%, 0% 100%, 0% 30%);
      transform: rotate(-1deg) scaleX(1.02);
      border: 0.1vmin solid rgba(120, 180, 255, 0.2);
    }

    .petalo::after {
      content: '';
      position: absolute;
      width: 0.2vmin;
      height: 90%;
      left: 50%;
      top: 5%;
      background: linear-gradient(to bottom, rgba(20, 70, 120, 0.7) 0%, rgba(60, 140, 210, 0.5) 50%, rgba(20, 70, 120, 0.7) 100%);
      transform: translateX(-50%);
      box-shadow: 0 0 0.2vmin rgba(0, 160, 255, 0.5);
      border-radius: 0.1vmin;
    }

    .petalo:nth-child(1) {
      transform: translate(-50%, -90%) rotate(0deg) translateY(-1.2vmin);
    }

    .petalo:nth-child(2) {
      transform: translate(-50%, -90%) rotate(45deg) translateY(-1.2vmin);
    }

    .petalo:nth-child(3) {
      transform: translate(-50%, -90%) rotate(90deg) translateY(-1.2vmin);
    }

    .petalo:nth-child(4) {
      transform: translate(-50%, -90%) rotate(135deg) translateY(-1.2vmin);
    }

    .petalo:nth-child(5) {
      transform: translate(-50%, -90%) rotate(180deg) translateY(-1.2vmin);
    }

    .petalo:nth-child(6) {
      transform: translate(-50%, -90%) rotate(225deg) translateY(-1.2vmin);
    }

    .petalo:nth-child(7) {
      transform: translate(-50%, -90%) rotate(270deg) translateY(-1.2vmin);
    }

    .petalo:nth-child(8) {
      transform: translate(-50%, -90%) rotate(315deg) translateY(-1.2vmin);
    }

    .venas {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    .vena {
      position: absolute;
      width: 0.1vmin;
      height: 70%;
      left: 50%;
      bottom: 15%;
      background: rgb(79, 199, 247);
      transform-origin: bottom center;
      border-radius: 0.1vmin;
    }

    .vena:nth-child(1) {
      transform: translateX(-50%) rotate(-18deg);
      height: 52%;
    }

    .vena:nth-child(2) {
      transform: translateX(-50%) rotate(-8deg);
      height: 70%;
    }

    .vena:nth-child(3) {
      transform: translateX(-50%) rotate(0deg);
      height: 84%;
      opacity: 0.7;
    }

    .vena:nth-child(4) {
      transform: translateX(-50%) rotate(8deg);
      height: 69%;
    }

    .vena:nth-child(5) {
      transform: translateX(-50%) rotate(18deg);
      height: 52%;
    }

    .centro {
      position: absolute;
      width: 5.5vmin;
      height: 5.5vmin;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, #1a2a3a 0%, #0a0f1a 90%);
      border-radius: 50%;
      box-shadow: inset 0 0 1vmin rgba(0, 0, 0, 0.8), 0 0 1.5vmin rgba(70, 160, 255, 0.7);
      z-index: 10;
    }

    .pistilo {
      position: absolute;
      width: 0.15vmin;
      height: 0.7vmin;
      background: linear-gradient(to top, #f0e68c, #b8860b);
      top: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 0.2vmin 0.2vmin 0 0;
      box-shadow: 0 0 0.2vmin #ffd700;
    }

    .pistilo:nth-child(1) {
      transform: translate(-50%, -50%) rotate(-35deg) translateY(-1vmin);
      height: 0.9vmin;
    }

    .pistilo:nth-child(2) {
      transform: translate(-50%, -50%) rotate(-10deg) translateY(-1.2vmin);
      height: 1.1vmin;
    }

    .pistilo:nth-child(3) {
      transform: translate(-50%, -50%) rotate(10deg) translateY(-1.2vmin);
      height: 1.1vmin;
    }

    .pistilo:nth-child(4) {
      transform: translate(-50%, -50%) rotate(35deg) translateY(-1vmin);
      height: 0.9vmin;
    }

    .brillo-central {
      position: absolute;
      width: 9vmin;
      height: 9vmin;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(100, 180, 255, 0.4) 0%, rgba(50, 120, 200, 0.1) 50%, transparent 80%);
      border-radius: 50%;
      animation: pulsar 2.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulsar {

      0%,
      100% {
        opacity: 0.6;
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.15);
      }
    }

    .stem-container {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .stem-container--1 {
      width: 30vmin;
      height: 40vmin;
    }

    .stem-container--2 {
      width: 30vmin;
      height: 55vmin;
    }

    .stem-container--3 {
      width: 30vmin;
      height: 55vmin;
    }

    .stem-container--4 {
      width: 30vmin;
      height: 40vmin;
    }

    .stem-container svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .stem-path {
      fill: none;
      stroke-width: 0.13vmin;
      stroke-linecap: round;
      filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.4));
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: draw-stem 2s ease-in-out forwards;
    }

    .leaf-svg-container {
      position: absolute;
      width: 12vmin;
      height: 16vmin;
      overflow: visible;
      opacity: 0;
      animation: reveal-leaf 0.01s ease 1.1s forwards;
    }

    @keyframes reveal-leaf {
      to {
        opacity: 1;
      }
    }

    .leaf-svg-container svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .leaf-fill {
      fill: none;
      animation: fill-leaf 0.4s ease 1.8s forwards;
    }

    .draw {
      fill: none;
      stroke: #2a582a;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: var(--len);
      stroke-dashoffset: var(--len);
      animation: draw-line var(--dur) cubic-bezier(0.4, 0, 0.2, 1) var(--delay) forwards;
      animation-delay: 1s;
    }

    .vein {
      fill: none;
      stroke: rgb(139, 236, 139);
      stroke-width: 1;
      stroke-linecap: round;
      stroke-dasharray: var(--len);
      stroke-dashoffset: var(--len);
      animation: draw-line var(--dur) ease var(--delay) forwards;
      animation-delay: 1.5s;
    }

    .hatch {
      stroke: rgba(120, 200, 120, 0.18);
      stroke-width: 0.6;
      stroke-linecap: round;
      stroke-dasharray: var(--len);
      stroke-dashoffset: var(--len);
      fill: none;
      animation: draw-line 0.2s ease var(--delay) forwards;
      animation-delay: 1s;
    }

    .leaf-svg--1a {
      left: 2.5vmin;
      bottom: -1vmin;
      transform: rotate(146deg) scale(1.5);
    }

    .leaf-svg--1b {
      left: -2.9vmin;
      bottom: 12vmin;
      transform: rotate(146deg) scale(1.5);
    }

    .leaf-svg--2a {
      left: -0.1vmin;
      bottom: 23vmin;
      transform: rotate(109deg) scale(1.5) scaleX(-1);
    }

    .leaf-svg--2b {
      left: 8.5vmin;
      bottom: 8vmin;
      transform: rotate(-3deg) scale(1.3);
    }

    .leaf-svg--3a {
      left: 13vmin;
      bottom: 28vmin;
      transform: rotate(15deg) scale(1.5) scaleX(-1);
    }

    .leaf-svg--3b {
      left: 17vmin;
      bottom: 17vmin;
      transform: rotate(-104deg) scale(1.4);
    }

    .leaf-svg--4b {
      left: 17vmin;
      bottom: 4vmin;
      transform: rotate(-150deg) scale(1.5) scaleX(-1);
    }

    .leaf-svg--4a {
      left: 24vmin;
      bottom: 14vmin;
      transform: rotate(-75deg) scale(1.5);
    }

    /* ===== PANICULATA ===== */
    .bouquet-wrapper {
      position: fixed;
      bottom: -7em;
      right: 17vw;
      z-index: 2;
      transform: translateX(20%) scale(1.3);
      pointer-events: none;
    }

    .bouquet-container {
      position: relative;
      display: inline-block;
      filter: drop-shadow(0 10px 30px rgba(255, 255, 255, 0.301));
    }

    .bouquet-container svg {
      max-width: 100%;
      height: auto;
    }

    .stem {
      stroke: #2d5016;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
    }

    @keyframes blooming-flower {
      0% {
        transform: scale(0);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes draw-stem {
      0% {
        stroke-dashoffset: 200;
      }

      100% {
        stroke-dashoffset: 0;
      }
    }

    @keyframes sway-flower {

      0%,
      100% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(0);
      }
    }

    @keyframes fill-leaf {
      to {
        fill: url(#leafGrad);
      }
    }

    @keyframes draw-line {
      to {
        stroke-dashoffset: 0;
      }
    }

    /* ===== PANTALLA DE PALABRAS ===== */
    #palabras-canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.8s ease;
      z-index: 50;
      background: black;
    }

    #palabras-canvas.visible {
      opacity: 1;
    }

    /* ===================================================
       ===== INTRO — REDISEÑO MEJORADO ==================
       =================================================== */

    #intro {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 60;
      transition: opacity 0.9s ease, transform 0.9s ease;
      overflow: hidden;
    }

    #intro.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.04);
    }

    #intro::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 20% 80%, rgba(180, 20, 60, 0.12) 0%, transparent 65%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(0, 160, 220, 0.08) 0%, transparent 65%),
        radial-gradient(ellipse 80% 70% at 50% 50%, rgba(255, 200, 220, 0.03) 0%, transparent 70%);
      pointer-events: none;
      animation: bgShift 8s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0% {
        opacity: 0.7;
      }

      100% {
        opacity: 1;
      }
    }

    #intro::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(-45deg,
          transparent,
          transparent 60px,
          rgba(255, 255, 255, 0.012) 60px,
          rgba(255, 255, 255, 0.012) 61px);
      pointer-events: none;
    }

    .intro-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .intro-icon {
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.1s both;
    }

    .intro-icon svg {
      width: clamp(40px, 6vw, 70px);
      height: auto;
      filter: drop-shadow(0 0 12px rgba(255, 150, 180, 0.5));
    }

    .intro-eyebrow {
      font-family: 'Lato', sans-serif;
      font-weight: 100;
      font-size: clamp(0.6rem, 1.4vw, 0.78rem);
      letter-spacing: 0.55em;
      color: rgba(255, 255, 255, 0.25);
      text-transform: uppercase;
      margin-bottom: 1.6rem;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.25s both;
    }

    .intro-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(3rem, 9vw, 7rem);
      font-weight: 700;
      color: #fff;
      line-height: 0.92;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.4s both;
    }

    .intro-title em {
      font-style: italic;
      font-weight: 400;
      display: block;
      background: linear-gradient(135deg, #ff8fa8 0%, #ffccd8 40%, #c8f0ff 80%, #80d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(255, 120, 160, 0.35));
      animation: fadeUp 1.2s ease 0.4s both, gradientShift 5s ease-in-out infinite alternate;
    }

    @keyframes gradientShift {
      0% {
        filter: drop-shadow(0 0 20px rgba(255, 120, 160, 0.3));
      }

      100% {
        filter: drop-shadow(0 0 40px rgba(120, 210, 255, 0.5));
      }
    }

    .intro-ornament {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0 2.6rem;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.55s both;
    }

    .intro-ornament-line {
      width: clamp(40px, 8vw, 100px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 140, 170, 0.5));
    }

    .intro-ornament-line:last-child {
      background: linear-gradient(90deg, rgba(255, 140, 170, 0.5), transparent);
    }

    .intro-ornament-diamond {
      width: 5px;
      height: 5px;
      background: rgba(255, 150, 180, 0.8);
      transform: rotate(45deg);
      box-shadow: 0 0 8px rgba(255, 120, 160, 0.6);
    }

    .intro-ornament-dot {
      width: 3px;
      height: 3px;
      background: rgba(255, 150, 180, 0.4);
      border-radius: 50%;
    }

    .intro-subtitle {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: clamp(0.75rem, 1.8vw, 0.95rem);
      letter-spacing: 0.22em;
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.65s both;
    }

    /* ===== BOTÓN CON EFECTO DE LLENADO ===== */
    #startBtn {
      position: relative;
      cursor: pointer;
      border: none;
      background: transparent;
      padding: 0;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.8s both;
      outline: none;
    }

    #startBtn .btn-inner {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1.1rem 3.2rem;
      color: #fff;
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.7rem, 1.6vw, 0.85rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      font-weight: 300;
      position: relative;
      overflow: hidden;
      min-width: 300px;
      justify-content: center;
      transition: color 0.3s;
    }

    /* Fill que se expande de izquierda a derecha */
    #startBtn .btn-fill {
      position: absolute;
      inset: 0;
      left: 0;
      width: 0%;
      background: linear-gradient(90deg, rgba(255, 100, 140, 0.85), rgba(255, 160, 190, 0.9));
      transition: none;
      z-index: 0;
      pointer-events: none;
    }

    /* Efecto shimmer que recorre el fill */
    #startBtn .btn-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: -60%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.35), transparent);
      animation: none;
    }

    #startBtn.filling .btn-fill::after {
      animation: shimmer 1s linear infinite;
    }

    @keyframes shimmer {
      0% {
        left: -60%;
      }

      100% {
        left: 110%;
      }
    }

    /* Cuando está llenando, el texto se vuelve blanco sólido */
    #startBtn.filling .btn-inner {
      color: #fff;
    }

    #startBtn.filling .btn-label {
      mix-blend-mode: normal;
    }

    /* Texto "Cargando..." que aparece mientras llena */
    #startBtn .btn-loading-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.7rem, 1.6vw, 0.85rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      font-weight: 300;
      color: #fff;
      opacity: 0;
      z-index: 2;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    #startBtn.filling .btn-loading-text {
      opacity: 1;
    }

    #startBtn.filling .btn-label,
    #startBtn.filling .btn-dot {
      opacity: 0;
      transition: opacity 0.15s;
    }

    /* Bordes del botón */
    #startBtn .btn-border {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #startBtn .btn-border::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255, 120, 160, 0.4);
      animation: borderPulse 3s ease-in-out infinite;
    }

    @keyframes borderPulse {

      0%,
      100% {
        border-color: rgba(255, 120, 160, 0.3);
      }

      50% {
        border-color: rgba(255, 160, 190, 0.6);
      }
    }

    /* Esquinas decorativas */
    #startBtn .btn-corner {
      position: absolute;
      width: 8px;
      height: 8px;
      border-color: rgba(255, 140, 170, 0.7);
      border-style: solid;
      transition: all 0.4s ease;
      z-index: 3;
    }

    #startBtn .btn-corner--tl {
      top: -1px;
      left: -1px;
      border-width: 1.5px 0 0 1.5px;
    }

    #startBtn .btn-corner--tr {
      top: -1px;
      right: -1px;
      border-width: 1.5px 1.5px 0 0;
    }

    #startBtn .btn-corner--bl {
      bottom: -1px;
      left: -1px;
      border-width: 0 0 1.5px 1.5px;
    }

    #startBtn .btn-corner--br {
      bottom: -1px;
      right: -1px;
      border-width: 0 1.5px 1.5px 0;
    }

    #startBtn:hover:not(.filling) .btn-corner {
      width: 14px;
      height: 14px;
      border-color: rgba(255, 160, 190, 1);
    }

    #startBtn .btn-label {
      position: relative;
      z-index: 1;
      transition: opacity 0.15s, letter-spacing 0.5s;
    }

    #startBtn:hover:not(.filling) .btn-label {
      letter-spacing: 0.5em;
    }

    .btn-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 140, 170, 0.8);
      position: relative;
      z-index: 1;
      flex-shrink: 0;
      transition: transform 0.4s ease, opacity 0.15s;
      animation: pulse 2.2s ease-in-out infinite;
    }

    #startBtn:hover:not(.filling) .btn-dot {
      transform: scale(1.5);
    }

    /* Barra de progreso debajo del botón */
    .btn-progress-bar {
      position: absolute;
      bottom: -3px;
      left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, rgba(255, 140, 170, 0.9), rgba(200, 230, 255, 0.9));
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(255, 140, 170, 0.6);
      transition: none;
      pointer-events: none;
    }

    .intro-hint {
      margin-top: 1.8rem;
      font-family: 'Lato', sans-serif;
      font-weight: 100;
      font-size: clamp(0.55rem, 1.2vw, 0.65rem);
      letter-spacing: 0.35em;
      color: rgba(255, 255, 255, 0.15);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1.4s ease 1.1s both;
    }

    .deco {

      opacity: 0;
      animation: fadeInDeco 2s ease 0.8s both;
      pointer-events: none;
    }

    .deco-left {

      bottom: 10vh;
      width: clamp(60px, 10vw, 150px);
    }

    .deco-right {
      right: 4vw;
      top: 10vh;
      width: clamp(60px, 10vw, 150px);
      transform: scaleX(-1);
    }

    @keyframes fadeInDeco {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 0.05;
        transform: translateY(0);
      }
    }

    .intro-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .intro-particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 180, 200, 0.6), transparent);
      animation: floatParticle linear infinite;
    }

    .intro-particle:nth-child(1) {
      width: 3px;
      height: 3px;
      left: 12%;
      animation-duration: 18s;
      animation-delay: 0s;
      bottom: -5%;
    }

    .intro-particle:nth-child(2) {
      width: 2px;
      height: 2px;
      left: 27%;
      animation-duration: 22s;
      animation-delay: -4s;
      bottom: -5%;
    }

    .intro-particle:nth-child(3) {
      width: 4px;
      height: 4px;
      left: 43%;
      animation-duration: 16s;
      animation-delay: -8s;
      bottom: -5%;
    }

    .intro-particle:nth-child(4) {
      width: 2px;
      height: 2px;
      left: 58%;
      animation-duration: 20s;
      animation-delay: -2s;
      bottom: -5%;
    }

    .intro-particle:nth-child(5) {
      width: 3px;
      height: 3px;
      left: 71%;
      animation-duration: 24s;
      animation-delay: -6s;
      bottom: -5%;
    }

    .intro-particle:nth-child(6) {
      width: 2px;
      height: 2px;
      left: 85%;
      animation-duration: 17s;
      animation-delay: -10s;
      bottom: -5%;
    }

    .intro-particle:nth-child(7) {
      width: 5px;
      height: 5px;
      left: 35%;
      animation-duration: 28s;
      animation-delay: -14s;
      bottom: -5%;
      background: radial-gradient(circle, rgba(180, 220, 255, 0.4), transparent);
    }

    .intro-particle:nth-child(8) {
      width: 2px;
      height: 2px;
      left: 65%;
      animation-duration: 19s;
      animation-delay: -7s;
      bottom: -5%;
    }

    .intro-particle:nth-child(9) {
      width: 3px;
      height: 3px;
      left: 8%;
      animation-duration: 21s;
      animation-delay: -11s;
      bottom: -5%;
    }

    .intro-particle:nth-child(10) {
      width: 2px;
      height: 2px;
      left: 92%;
      animation-duration: 15s;
      animation-delay: -3s;
      bottom: -5%;
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }

      10% {
        opacity: 0.8;
      }

      90% {
        opacity: 0.4;
      }

      100% {
        transform: translateY(-105vh) translateX(20px);
        opacity: 0;
      }
    }

    .intro-bg-heart {
      position: absolute;
      font-size: clamp(200px, 40vw, 420px);
      opacity: 0.018;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      user-select: none;
      animation: heartBeat 6s ease-in-out infinite;
      filter: blur(2px);
    }

    @keyframes heartBeat {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.018;
      }

      50% {
        transform: translate(-50%, -50%) scale(1.05);
        opacity: 0.028;
      }
    }

    .mini-heart {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      font-size: 1.2rem;
      animation: floatHeart 1.4s ease-out forwards;
      user-select: none;
    }

    @keyframes floatHeart {
      0% {
        transform: translateY(0) scale(0.4) rotate(var(--rot));
        opacity: 1;
      }

      40% {
        transform: translateY(-60px) scale(1.1) rotate(var(--rot));
        opacity: 1;
      }

      100% {
        transform: translateY(-140px) scale(0.7) rotate(var(--rot));
        opacity: 0;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.5);
        opacity: 1;
      }
    }


    @media (max-width: 1000px) {
      body {
        width: 100vh;
        height: 100vw;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(90deg);
      }

      #palabras-canvas {
        width: 180vw;
        height: 100vh;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .scene {
        right: 5vw;
        /* era 29vw, con rotación no tiene sentido */
      }

      .bouquet-wrapper {
        transform: scale(0.7);
      }

      .flowers {
        left: -10em;
        top: -9em;
      }

      .bouquet-container {
        right: -16.07em;
        bottom: 3em;
      }
      #heartCanvas {
      left: -4em;
      top: 13em;
      position: fixed;
      width: 460px;
      height: 460px;
    }
    }
  </style>
</head>

<body>

  <script>
    /* ── Efecto de llenado del botón ── */
    (function () {
      var FILL_DURATION = 2000; // ms que tarda en llenarse
      var fillEl = document.getElementById('btnFill');
      var progressEl = document.getElementById('btnProgressBar');
      var loadingText = document.getElementById('btnLoadingText');
      var rafId = null;
      var startTime = null;

      /* Frases que rotan mientras carga */
      var loadingPhrases = ["Abriendo...", "Preparando...", "Ya casi..."];
      var phraseIndex = 0;
      var phraseInterval = null;

      function animateFill(timestamp) {
        if (!startTime) startTime = timestamp;
        var elapsed = timestamp - startTime;
        var progress = Math.min(elapsed / FILL_DURATION, 1);

        /* Curva ease-in-out suave */
        var eased = progress < 0.5
          ? 2 * progress * progress
          : 1 - Math.pow(-2 * progress + 2, 2) / 2;

        var pct = (eased * 100).toFixed(2) + '%';
        fillEl.style.width = pct;
        progressEl.style.width = pct;

        if (progress < 1) {
          rafId = requestAnimationFrame(animateFill);
        } else {
          /* Llenado completo — lanzar animación */
          fillEl.style.width = '100%';
          progressEl.style.width = '100%';
          clearInterval(phraseInterval);
          loadingText.textContent = '✓';

          setTimeout(function () {
            window.__startPalabraAnimation__();
          }, 180);
        }
      }

      function startFillEffect() {
        /* Rotación de frases */
        phraseInterval = setInterval(function () {
          phraseIndex = (phraseIndex + 1) % loadingPhrases.length;
          loadingText.textContent = loadingPhrases[phraseIndex];
        }, 480);

        startTime = null;
        rafId = requestAnimationFrame(animateFill);
      }

      /* Sobrescribir handleBtnClick después de que palabras.js lo registra */
      var _originalInit = window.__PALABRAS_INIT__;
      window.__PALABRAS_INIT__ = function () {
        _originalInit();

        window.handleBtnClick = function (e) {
          var btn = document.getElementById('startBtn');
          if (btn.classList.contains('filling')) return;
          btn.classList.add('filling');

          /* Música */
          var bgMusic = document.getElementById('bgMusic');
          bgMusic.volume = 0.7;
          bgMusic.play().catch(function () { });

          /* Iniciar efecto de llenado */
          startFillEffect();
        };
      };
    })();

    window.__PALABRAS_INIT__();

    window.addEventListener("palabrasTerminadas", function () {
      requestAnimationFrame(function () {
        requestAnimationFrame(initPaniculata);
      });
    });

    window.initPaniculata = function initPaniculata() {
      var svg = document.querySelector('.bouquet-container svg');
      if (!svg) return;
      var stems = Array.from(svg.querySelectorAll('path.stem'));
      var flowers = Array.from(svg.querySelectorAll('use'));

      function getPathEndY(path) {
        var nums = path.getAttribute('d').match(/-?[\d.]+/g).map(Number);
        return nums[nums.length - 1];
      }
      function getFlowerY(use) { return parseFloat(use.getAttribute('y') || 0); }

      stems.forEach(function (stem) {
        try {
          var len = stem.getTotalLength();
          stem.style.strokeDasharray = len;
          stem.style.strokeDashoffset = len;
          stem.style.transition = 'none';
        } catch (e) { }
      });
      flowers.forEach(function (f) { f.style.opacity = '0'; f.style.transition = 'none'; });

      var stemsWithY = stems.map(function (s) { return { el: s, y: getPathEndY(s) }; }).sort(function (a, b) { return b.y - a.y; });
      var extraDelay = 2500, totalStemDuration = 4200;
      stemsWithY.forEach(function (item, i) {
        setTimeout(function () {
          item.el.style.transition = 'stroke-dashoffset 0.15s ease-out';
          item.el.style.strokeDashoffset = '0';
        }, extraDelay + i * (totalStemDuration / stemsWithY.length));
      });

      var flowersWithY = flowers.map(function (f) { return { el: f, y: getFlowerY(f) }; }).sort(function (a, b) { return b.y - a.y; });
      var flowerStart = extraDelay + totalStemDuration * 0.2, totalFlowerDur = 1200;
      flowersWithY.forEach(function (item, i) {
        item.el.style.setProperty('--i', (i % 20).toString());
        setTimeout(function () {
          item.el.style.transition = 'opacity 0.3s ease-in';
          item.el.style.opacity = '1';
        }, flowerStart + i * (totalFlowerDur / flowersWithY.length));
      });
    };
  </script>
